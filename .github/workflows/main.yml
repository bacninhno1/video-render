name: Process Video Job

on:
  repository_dispatch:
    types: [render_video_jobs]

jobs:
  ffmpeg-job:
    # Dùng thẳng môi trường Ubuntu của GitHub để có sẵn curl, jq, ffmpeg
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # KHÔNG CẦN bước cài đặt tools vì ubuntu-latest đã có sẵn hết

      - name: Download Input Video & Intro
        run: |
          set -e
          VIDEO_URL="${{ github.event.client_payload.video_url }}"
          INTRO_URL="${{ github.event.client_payload.intro_url }}"

          echo "::add-mask::$VIDEO_URL"
          echo "::add-mask::$INTRO_URL"

          echo "⬇ Downloading main video..."
          # --retry 3 giúp tự động tải lại nếu mạng lag
          curl -L --fail --retry 3 -o input.mp4 "$VIDEO_URL"

          if [ ! -z "$INTRO_URL" ] && [ "$INTRO_URL" != "0" ]; then
            echo "⬇ Downloading intro..."
            curl -L --fail --retry 3 -o intro.mp4 "$INTRO_URL"
          else
            echo "No intro provided."
          fi

      - name: Run FFmpeg Video Processing
        run: |
          set -e
          chmod +x process_video.sh
          
          INTRO_FILE=""
          [ -s intro.mp4 ] && INTRO_FILE="intro.mp4"

          echo "🚀 Processing video..."
          ./process_video.sh \
            input.mp4 \
            "$INTRO_FILE" \
            "${{ github.event.client_payload.flip }}" \
            output_final.mp4

          if [ ! -s output_final.mp4 ]; then
            echo "❌ Error: FFmpeg failed to produce output."
            exit 1
          fi

      - name: Upload Processed Video & Callback
        run: |
          set -e
          echo "⬆ Uploading final video..."
          
          # Lưu response và kiểm tra HTTP code
          response=$(curl -s -w "%{http_code}" -o upload_response.json \
                     -F "file=@output_final.mp4" \
                     "${{ secrets.UPLOAD_URL }}")
          
          status_code=$(echo "$response" | tail -c 3)

          if [ "$status_code" != "200" ]; then
            echo "❌ Upload failed! HTTP $status_code"
            cat upload_response.json
            exit 1
          fi

          # Dùng jq trích xuất URL an toàn (xử lý được trường hợp null/trống)
          output_url=$(jq -r '.output_url // empty' upload_response.json)

          if [ -z "$output_url" ]; then
            echo "❌ Error: No output_url found in response."
            exit 1
          fi

          echo "::add-mask::$output_url"
          echo "✅ Upload thành công."

          # Dùng jq để tạo JSON callback an toàn tuyệt đối
          CALLBACK_DATA=$(jq -n \
            --arg id "${{ github.event.client_payload.job_id }}" \
            --arg url "$output_url" \
            '{job_id: $id, output_url: $url}')

          echo "📡 Sending callback..."
          curl -s -X POST -H "Content-Type: application/json" \
               -d "$CALLBACK_DATA" \
               "${{ secrets.CALLBACK_URL }}"
          echo "✅ Callback sent."
